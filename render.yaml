services:
  - type: web
    name: grc-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: "/"
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./grc.db
      - key: SECRET_KEY
        value: GRCSYSTEMSECRET2024_CHANGE_IN_PRODUCTION
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://yourapp.com,https://localhost:3000,*
      - key: LOG_LEVEL
        value: INFO
