version: '3.8'

services:
  # FastAPI Backend (Simplified for development)
  backend:
    build: .
    container_name: grc_backend
    environment:
      DATABASE_URL: sqlite:///./grc.db
      SECRET_KEY: ${SECRET_KEY:-GRCSYSTEMSECRET2024_CHANGE_IN_PRODUCTION}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ENVIRONMENT: development
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,*
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
      - ./uploads:/app/uploads
      - ./ml_models:/app/ml_models
      - ./logs:/app/logs
    networks:
      - grc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  grc_network:
    driver: bridge
